# Nidavellir arena package mirror — an allowlisted forward proxy.
#
# Locked arenas have no internet egress; a foothold's only off-segment route is
# this proxy, and the proxy permits ONLY package-repository upstreams. An agent
# can therefore `apt`/`pip install` tooling, but cannot reach arbitrary hosts
# (no C2, no exfil). The proxy is NOT a router — peers cannot tunnel raw traffic
# through it, only HTTP(S) to the allowlist below.

http_port 3128

# Arena clients live on Docker's private bridge ranges.
acl arena_clients src 172.16.0.0/12
acl arena_clients src 192.168.0.0/16
acl arena_clients src 10.0.0.0/8

# Allowlisted package upstreams (apt + pip). Extend deliberately — every entry
# is a host an otherwise-contained agent can reach. Use the dot-prefixed form
# (".debian.org" matches the apex AND subdomains); squid rejects listing both a
# domain and its own subdomain wildcard.
acl allowed_upstreams dstdomain .debian.org
acl allowed_upstreams dstdomain .kali.org kali.download
acl allowed_upstreams dstdomain .ubuntu.com
acl allowed_upstreams dstdomain .pypi.org pypi.python.org
acl allowed_upstreams dstdomain .pythonhosted.org

# HTTPS (pip, https apt repos) tunnels via CONNECT — restrict it to port 443.
acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports

# Permit allowlisted upstreams from arena clients; deny everything else.
http_access allow arena_clients allowed_upstreams
http_access deny all

# Stateless for the MVP: no on-disk cache (so no swap dirs to initialize).
cache deny all

# Log to the package's proxy-writable dir (squid drops privileges to 'proxy',
# which cannot open the container's root-owned /dev/stdout). `docker exec
# cat /var/log/squid/access.log` shows the allow/deny decisions when debugging.
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
pid_filename none
