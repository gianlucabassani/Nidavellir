# Alembic configuration (ADR-0004). The database URL is NOT set here — it is
# resolved at runtime by migrations/env.py via database.database_url(), so the
# same DATABASE_URL / DATABASE_PATH environment drives app and migrations.
#
# Usage (from this directory):
#   alembic upgrade head
#   alembic revision --autogenerate -m "describe the change"   # then review!

[alembic]
script_location = migrations
prepend_sys_path = .
