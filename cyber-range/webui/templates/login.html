{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card bg-dark-glass border-secondary">
            <div class="card-body p-4">
                <h4 class="font-tech text-center mb-4">
                    <i class="fa-solid fa-lock text-warning me-2"></i>OPERATOR LOGIN
                </h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small text-uppercase">Username</label>
                        <input type="text" class="form-control" name="username" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 font-tech fw-bold">
                        AUTHENTICATE
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
