[pytest]
# Put the orchestrator service (flat-import package) on sys.path so tests can
# `from database import ...` etc. conftest.py also enforces this.
pythonpath =
    cyber-range/services/scenario-orchestrator
    cyber-range/services/agent-gateway
testpaths = tests
addopts = -ra -q
markers =
    integration: exercises real external tooling (e.g. a local `tofu init`); skipped when the tool is absent
filterwarnings =
    ignore::DeprecationWarning
