name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Lint, security scan & tests
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install OpenTofu (for the provisioning integration test)
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.6.0"
          tofu_wrapper: false

      - name: Lint (ruff)
        run: ruff check cyber-range tests

      - name: Security scan (bandit)
        # -ll = medium+ severity. Blocking since the Phase-1 hardening pass
        # (2026-06-10) brought the tree to zero findings.
        run: bandit -r cyber-range -ll

      - name: Run tests with coverage
        run: pytest --cov=cyber-range/services/scenario-orchestrator --cov-report=term-missing

  postgres-compat:
    # ADR-0004: SQLite is the default test backend (job above); this job
    # proves the same suite passes against the deployed-environment backend.
    name: Tests on PostgreSQL
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "true"
      DATABASE_URL: postgresql+psycopg://nidavellir:ci-only-pw@localhost:5432/nidavellir
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nidavellir
          POSTGRES_PASSWORD: ci-only-pw
          POSTGRES_DB: nidavellir
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U nidavellir"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests against PostgreSQL
        run: pytest

  docker-build:
    name: Build container images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build orchestrator image
        run: docker build -t nidavellir-orchestrator ./cyber-range/services/scenario-orchestrator

      - name: Build webui image
        run: docker build -t nidavellir-webui ./cyber-range/webui

      - name: Validate docker-compose config
        run: docker compose config -q
